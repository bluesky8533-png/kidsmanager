<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1D3557">
  
  <title>우리아이 레벨업 매니저</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @keyframes spin-slow { 100% { transform: rotate(360deg); } }
    @keyframes pop-in { 0% { transform: scale(0.5); opacity: 0; } 80% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes slide-up { 0% { transform: translate(-50%, 100%); opacity: 0; } 10% { transform: translate(-50%, 0); opacity: 1; } 90% { transform: translate(-50%, 0); opacity: 1; } 100% { transform: translate(-50%, 100%); opacity: 0; } }
    .animate-pop-in { animation: pop-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    .animate-toast { animation: slide-up 3s ease-in-out forwards; }
    
    body {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      background-color: #F0F4F8;
    }
    
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Icons ---
    const IconClock = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
    const IconSparkles = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>;
    const IconTrophy = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>;
    const IconZap = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>;
    const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
    const IconShoppingBag = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>;
    const IconGamepad = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="12" x="2" y="6" rx="2"/><line x1="6" x2="10" y1="12" y2="12"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="15" x2="15.01" y1="13" y2="13"/><line x1="18" x2="18.01" y1="11" y2="11"/></svg>;
    const IconSettings = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>;

    // --- Data Factory ---
    const getInitialHabits = () => [
      { id: 1, text: '영양제 섭취', done: false },
      { id: 2, text: '9시 정각 취침', done: false },
      { id: 3, text: '7:30 양치질', done: false },
      { id: 4, text: '세수 및 로션', done: false },
      { id: 5, text: '가방/외투 정리', done: false }
    ];

    const getInitialLearning = () => ({
      essentialMath: false, // 디딤돌 기본+응용/최상위
      essentialEnglish: false, // 영어도서관 3권
      additionalSubjectSets: 0, // 영어/국어/수학 세트
      elihigh: false // 엘리하이
    });

    const createKidState = () => ({
      habits: getInitialHabits(),
      learning: getInitialLearning(),
      earnedBonus: false,
      usedPoints: 0,
      adminAdjustments: 0,
      history: []
    });

    const rewardItems = [
      { id: 'game', name: '게임 30분', cost: 400, icon: IconGamepad, color: '#2A9D8F' },
      { id: 'allowance1', name: '쌍둥이 용돈', cost: 1200, icon: IconTrophy, color: '#E9C46A' },
      { id: 'allowance2', name: '윤지용돈/도서', cost: 2000, icon: IconShoppingBag, color: '#F4A261' },
      { id: 'date', name: '데이트권', cost: 3000, icon: IconTrophy, color: '#E76F51' }
    ];

    const App = () => {
      const kidsNames = ['듄지', '효니', '뀨리'];
      const [activeTab, setActiveTab] = useState(kidsNames[0]);
      const [currentTime, setCurrentTime] = useState(new Date());
      const [testMode, setTestMode] = useState(false);
      const [notification, setNotification] = useState(null);
      const notifyTimeout = useRef(null);

      const [kidsData, setKidsData] = useState({
        '듄지': createKidState(),
        '효니': createKidState(),
        '뀨리': createKidState()
      });

      const [showPopup, setShowPopup] = useState(false);
      const [quickActionTarget, setQuickActionTarget] = useState('듄지');

      useEffect(() => {
        const timer = setInterval(() => setCurrentTime(new Date()), 60000);
        return () => clearInterval(timer);
      }, []);

      const showNotification = (message, type = 'info') => {
        if (notifyTimeout.current) clearTimeout(notifyTimeout.current);
        setNotification({ message, type });
        notifyTimeout.current = setTimeout(() => setNotification(null), 3000);
      };

      const calcKidPoints = (kid) => {
        const habitPts = kid.habits.filter(h => h.done).length * 20;
        const bonusPts = kid.earnedBonus ? 20 : 0;
        
        // 필수 학습 포인트
        const essentialMathPts = kid.learning.essentialMath ? 100 : 0;
        const essentialEnglishPts = kid.learning.essentialEnglish ? 100 : 0;
        
        // 추가 학습 포인트
        const additionalSetsPts = kid.learning.additionalSubjectSets * 120; // 1세트당 120P (가정)
        const elihighPts = kid.learning.elihigh ? 100 : 0;
        
        const totalEarned = habitPts + bonusPts + essentialMathPts + essentialEnglishPts + additionalSetsPts + elihighPts;
        const currentBalance = totalEarned + kid.adminAdjustments - kid.usedPoints;
        
        return { 
          habitPts, 
          essentialPts: essentialMathPts + essentialEnglishPts, 
          additionalPts: additionalSetsPts + elihighPts,
          totalEarned, 
          currentBalance 
        };
      };

      const updateKidData = (kidName, updater) => {
        setKidsData(prev => ({ ...prev, [kidName]: updater(prev[kidName]) }));
      };

      const toggleHabit = (id) => {
        if (activeTab === 'ADMIN') return;
        updateKidData(activeTab, (kid) => {
          const newHabits = kid.habits.map(h => h.id === id ? { ...h, done: !h.done } : h);
          const isAllDone = newHabits.every(h => h.done);
          const currentHour = new Date().getHours();
          const isWithinTimeFrame = testMode || (currentHour >= 8 && currentHour < 20);
          
          let newBonus = kid.earnedBonus;
          if (isAllDone && !kid.earnedBonus) {
            if (isWithinTimeFrame) { newBonus = true; setShowPopup(true); }
            else { showNotification('8~20시 사이에만 보너스가 지급됩니다.', 'info'); }
          } else if (!isAllDone) { newBonus = false; }
          return { ...kid, habits: newHabits, earnedBonus: newBonus };
        });
      };

      const updateLearning = (field, value) => {
        if (activeTab === 'ADMIN') return;
        updateKidData(activeTab, (kid) => {
          const newLearning = { ...kid.learning };
          if (field === 'additionalSubjectSets') {
            newLearning[field] = Math.max(0, newLearning[field] + value);
          } else {
            newLearning[field] = value;
          }
          return { ...kid, learning: newLearning };
        });
      };

      const handleQuickAction = (type, amount, desc) => {
        const timeStr = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
        const finalAmt = type === 'add' ? amount : -amount;
        updateKidData(quickActionTarget, (kid) => ({
          ...kid,
          adminAdjustments: kid.adminAdjustments + finalAmt,
          history: [{ id: Date.now(), time: timeStr, type: type === 'add' ? 'admin_add' : 'admin_sub', amount, desc }, ...kid.history]
        }));
        showNotification(`${quickActionTarget} : ${desc} 처리 완료`, type === 'add' ? 'success' : 'error');
      };

      const purchaseReward = (item) => {
        const pts = calcKidPoints(kidsData[activeTab]);
        if (pts.currentBalance >= item.cost) {
          const timeStr = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
          updateKidData(activeTab, (kid) => ({
            ...kid,
            usedPoints: kid.usedPoints + item.cost,
            history: [{ id: Date.now(), time: timeStr, type: 'spend', amount: item.cost, desc: item.name }, ...kid.history]
          }));
          showNotification(`${item.name} 교환 성공!`, 'success');
        } else {
          showNotification('포인트가 부족합니다.', 'error');
        }
      };

      const activeData = activeTab !== 'ADMIN' ? kidsData[activeTab] : null;
      const activePts = activeData ? calcKidPoints(activeData) : null;

      return (
        <div className="min-h-screen text-[#1D3557] font-sans pb-24 relative overflow-x-hidden pt-safe">
          {notification && (
            <div className={`fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] flex w-11/12 max-w-sm items-center gap-3 rounded-2xl p-4 shadow-2xl animate-toast ${notification.type === 'error' ? 'bg-red-50 text-red-700 border-2 border-red-200' : 'bg-[#1D3557] text-white'}`}>
              <IconZap />
              <p className="text-sm font-bold flex-1">{notification.message}</p>
            </div>
          )}

          {showPopup && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-[#1D3557]/80 backdrop-blur-md">
              <div className="bg-white rounded-[2rem] p-8 text-center max-w-sm w-full animate-pop-in">
                <div className="bg-[#E9C46A] w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-white"><IconSparkles /></div>
                <h2 className="text-2xl font-black text-[#E76F51] mb-2">MISSION CLEAR!</h2>
                <div className="bg-gray-50 rounded-2xl p-4 border-2 border-dashed border-[#2A9D8F] mb-6 text-4xl font-black text-[#2A9D8F]">+20P</div>
                <button onClick={() => setShowPopup(false)} className="w-full bg-[#1D3557] text-white py-4 rounded-xl font-black">확인</button>
              </div>
            </div>
          )}

          <div className="sticky top-0 z-40 bg-white/90 backdrop-blur-md border-b">
            <div className="px-4 py-2 border-b flex justify-between items-center bg-gray-50 text-[10px] text-gray-400 font-bold">
              <div className="flex items-center gap-1"><IconClock /> {currentTime.toLocaleTimeString()} <button onClick={() => setTestMode(!testMode)} className="ml-2 underline">{testMode ? 'TEST' : ''}</button></div>
              {activeTab !== 'ADMIN' && <div className="text-[#1D3557]">잔액: <span className="text-[#E76F51]">{activePts?.currentBalance}P</span></div>}
            </div>
            <div className="flex overflow-x-auto no-scrollbar p-2 gap-2">
              {kidsNames.map(name => (
                <button key={name} onClick={() => setActiveTab(name)} className={`flex-1 min-w-[70px] py-2 rounded-xl text-sm font-black ${activeTab === name ? 'bg-[#1D3557] text-white shadow-md' : 'bg-white text-gray-400 border border-gray-100'}`}>{name}</button>
              ))}
              <button onClick={() => setActiveTab('ADMIN')} className={`flex items-center gap-1 px-4 py-2 rounded-xl text-sm font-black ${activeTab === 'ADMIN' ? 'bg-[#E76F51] text-white shadow-md' : 'bg-white text-gray-400 border border-gray-100'}`}><IconSettings /> 관리자</button>
            </div>
          </div>

          {activeTab === 'ADMIN' ? (
            <main className="max-w-7xl mx-auto px-4 mt-6 space-y-6">
              <h2 className="text-xl font-black border-l-4 border-[#E76F51] pl-3">부모님 관리창</h2>
              <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                {kidsNames.map(name => {
                  const pts = calcKidPoints(kidsData[name]);
                  return (
                    <div key={name} className="bg-white p-5 rounded-2xl shadow-sm border">
                      <h3 className="text-lg font-black">{name}</h3>
                      <div className="mt-2 text-xs text-gray-400 space-y-1">
                        <div className="flex justify-between"><span>오늘 획득</span><span>+{pts.totalEarned}P</span></div>
                        <div className="flex justify-between"><span>누적 사용</span><span>-{kidsData[name].usedPoints}P</span></div>
                        <div className="flex justify-between font-black border-t pt-1 mt-1 text-[#1D3557]"><span>현재 잔액</span><span>{pts.currentBalance}P</span></div>
                      </div>
                    </div>
                  );
                })}
              </div>

              <div className="bg-white p-5 rounded-[1.5rem] shadow-sm border-2 border-orange-100">
                <h3 className="text-base font-black mb-4 flex items-center gap-2 text-[#1D3557]"><IconZap /> 빠른 포인트 조정</h3>
                <select value={quickActionTarget} onChange={e => setQuickActionTarget(e.target.value)} className="w-full mb-4 p-2 border rounded-xl font-black text-sm">
                  {kidsNames.map(n => <option key={n} value={n}>{n}</option>)}
                </select>
                <div className="grid grid-cols-1 gap-2">
                  <button onClick={() => handleQuickAction('sub', 50, '학습 무성의/오답 과다')} className="flex justify-between items-center p-3 bg-red-50 text-red-600 rounded-xl border border-red-200">
                    <span className="text-xs font-bold">무성의/오답 과다</span><span className="font-black">-50P</span>
                  </button>
                  <button onClick={() => handleQuickAction('sub', 50, '거짓말/정직 위반')} className="flex justify-between items-center p-3 bg-red-50 text-red-600 rounded-xl border border-red-200">
                    <span className="text-xs font-bold">거짓말 적발</span><span className="font-black">-50P</span>
                  </button>
                  <button onClick={() => handleQuickAction('add', 50, '개별 미션 수행')} className="flex justify-between items-center p-3 bg-green-50 text-green-600 rounded-xl border border-green-200">
                    <span className="text-xs font-bold">개별 미션 성공</span><span className="font-black">+50P</span>
                  </button>
                </div>
              </div>

              <div className="bg-white p-5 rounded-[1.5rem] shadow-sm border">
                <h3 className="text-sm font-black mb-3 text-gray-400">최근 히스토리</h3>
                <div className="space-y-2 max-h-60 overflow-y-auto pr-2">
                  {kidsNames.flatMap(n => kidsData[n].history.map(h => ({...h, kid: n})))
                    .sort((a,b) => b.id - a.id)
                    .map(h => (
                      <div key={h.id} className="text-[11px] p-2 border-b flex justify-between items-center">
                        <span><b>{h.kid}</b> {h.desc}</span>
                        <span className={`font-black ${h.type.includes('sub') || h.type === 'spend' ? 'text-red-500' : 'text-green-600'}`}>
                          {h.type.includes('sub') || h.type === 'spend' ? '-' : '+'}{h.amount}P
                        </span>
                      </div>
                    ))}
                </div>
              </div>
            </main>
          ) : (
            <main className="max-w-7xl mx-auto px-4 mt-6 space-y-6">
              <div className="bg-[#1D3557] p-6 rounded-[2rem] text-white shadow-lg">
                <h1 className="text-2xl font-black">{activeTab}의 레벨업</h1>
                <p className="text-[10px] text-orange-200 opacity-80 mt-1 italic">"정석 식단처럼, 정석 습관으로 48kg 목표 달성!"</p>
              </div>

              {/* 생활 습관 */}
              <section className="bg-white rounded-[1.5rem] p-5 shadow-sm border">
                <h2 className="text-lg font-black mb-4 flex items-center gap-2"><IconSparkles /> 5대 생활 습관</h2>
                <div className="grid grid-cols-1 gap-2">
                  {activeData.habits.map(h => (
                    <button key={h.id} onClick={() => toggleHabit(h.id)} className={`flex items-center justify-between p-3 rounded-xl border-2 transition-all ${h.done ? 'bg-green-50 border-green-200' : 'bg-white border-gray-50'}`}>
                      <span className={`font-bold text-xs ${h.done ? 'text-green-700' : 'text-gray-400'}`}>{h.text}</span>
                      <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center ${h.done ? 'bg-green-500 border-green-500 text-white' : 'border-gray-200'}`}>
                        {h.done && <IconCheck />}
                      </div>
                    </button>
                  ))}
                </div>
              </section>

              {/* 필수 학습 */}
              <section className="space-y-4">
                <h2 className="text-lg font-black border-l-4 border-red-500 pl-2">필수 학습 (각 100P)</h2>
                <div className="grid grid-cols-1 gap-3">
                  <button onClick={() => updateLearning('essentialMath', !activeData.learning.essentialMath)} className={`p-4 rounded-2xl border-2 flex justify-between items-center ${activeData.learning.essentialMath ? 'bg-red-50 border-red-200 text-red-700' : 'bg-white border-gray-100'}`}>
                    <span className="text-sm font-black">디딤돌 기본+응용 / 최상위</span>
                    <span className="font-black">100P</span>
                  </button>
                  <button onClick={() => updateLearning('essentialEnglish', !activeData.learning.essentialEnglish)} className={`p-4 rounded-2xl border-2 flex justify-between items-center ${activeData.learning.essentialEnglish ? 'bg-red-50 border-red-200 text-red-700' : 'bg-white border-gray-100'}`}>
                    <span className="text-sm font-black">영어도서관 3권 읽기</span>
                    <span className="font-black">100P</span>
                  </button>
                </div>
              </section>

              {/* 추가 학습 */}
              <section className="space-y-4">
                <h2 className="text-lg font-black border-l-4 border-blue-500 pl-2">추가 학습</h2>
                <div className="bg-white p-5 rounded-2xl border shadow-sm">
                  <div className="flex justify-between items-center mb-4">
                    <span className="text-sm font-black text-blue-700">영어 / 국어 / 수학 (세트당 120P)</span>
                    <span className="font-black text-blue-500">{activeData.learning.additionalSubjectSets * 120}P</span>
                  </div>
                  <div className="flex items-center border rounded-xl overflow-hidden">
                    <button onClick={() => updateLearning('additionalSubjectSets', -1)} className="flex-1 py-3 bg-gray-50 font-black">-</button>
                    <span className="flex-1 text-center font-black text-sm">{activeData.learning.additionalSubjectSets} 세트</span>
                    <button onClick={() => updateLearning('additionalSubjectSets', 1)} className="flex-1 py-3 bg-gray-50 font-black">+</button>
                  </div>
                </div>
                <button onClick={() => updateLearning('elihigh', !activeData.learning.elihigh)} className={`w-full p-4 rounded-2xl border-2 flex justify-between items-center ${activeData.learning.elihigh ? 'bg-indigo-50 border-indigo-200 text-indigo-700' : 'bg-white border-gray-100'}`}>
                  <span className="text-sm font-black">엘리하이 학습</span>
                  <span className="font-black">100P</span>
                </button>
              </section>

              {/* 보상 상점 */}
              <section className="bg-white p-5 rounded-[1.5rem] border shadow-sm">
                <h2 className="text-lg font-black mb-4 flex items-center gap-2"><IconShoppingBag /> 보상 상점</h2>
                <div className="grid grid-cols-2 gap-3">
                  {rewardItems.map(item => (
                    <button key={item.id} onClick={() => purchaseReward(item)} className="p-4 border rounded-2xl flex flex-col items-center gap-2 active:scale-95 transition-transform bg-white">
                      <div style={{ color: item.color }}><item.icon /></div>
                      <span className="text-[10px] font-bold text-gray-400">{item.name}</span>
                      <span className="font-black text-sm">{item.cost}P</span>
                    </button>
                  ))}
                </div>
              </section>
            </main>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
