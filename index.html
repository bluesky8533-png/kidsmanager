<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1D3557">
  
  <title>우리아이 레벨업 매니저</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @keyframes spin-slow { 100% { transform: rotate(360deg); } }
    @keyframes pop-in { 0% { transform: scale(0.5); opacity: 0; } 80% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes slide-up { 0% { transform: translate(-50%, 100%); opacity: 0; } 10% { transform: translate(-50%, 0); opacity: 1; } 90% { transform: translate(-50%, 0); opacity: 1; } 100% { transform: translate(-50%, 100%); opacity: 0; } }
    .animate-pop-in { animation: pop-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    .animate-spin-slow { animation: spin-slow 12s linear infinite; }
    .animate-float { animation: float 3s ease-in-out infinite; }
    .animate-toast { animation: slide-up 3s ease-in-out forwards; }
    
    body {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      background-color: #F0F4F8;
    }
    
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const IconClock = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
    const IconSparkles = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>;
    const IconTrophy = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>;
    const IconZap = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>;
    const IconCheckCircle = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
    const IconCircle = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/></svg>;
    const IconTrendingUp = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>;
    const IconShoppingBag = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>;
    const IconGamepad = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="6" x2="10" y1="12" y2="12"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="15" x2="15.01" y1="13" y2="13"/><line x1="18" x2="18.01" y1="11" y2="11"/><rect width="20" height="12" x="2" y="6" rx="2"/></svg>;
    const IconAlertCircle = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>;
    const IconSettings = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>;
    const IconAlertOctagon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="7.86 2 16.14 2 22 7.86 22 16.14 16.14 22 7.86 22 2 16.14 2 7.86 7.86 2"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>;
    const IconStar = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>;

    const getInitialHabits = () => [
      { id: 1, text: '영양제 섭취', done: false },
      { id: 2, text: '9시 정각 취침', done: false },
      { id: 3, text: '7:30 양치질', done: false },
      { id: 4, text: '세수 및 로션', done: false },
      { id: 5, text: '가방/외투 정리', done: false }
    ];

    const getInitialLearning = () => ({
      math: { baseDone: false, extra: 0 },
      language: { baseDone: false, extra: 0 },
      elihigh: { done: false },
      englishBook: { done: false }
    });

    const createKidState = () => ({
      habits: getInitialHabits(),
      learning: getInitialLearning(),
      earnedBonus: false,
      usedPoints: 0,
      adminAdjustments: 0,
      history: []
    });

    const rewardItems = [
      { id: 'game', name: '게임 30분', cost: 400, icon: IconGamepad, color: '#2A9D8F' },
      { id: 'allowance1', name: '쌍둥이 용돈', cost: 1200, icon: IconTrendingUp, color: '#E9C46A' },
      { id: 'allowance2', name: '윤지용돈/도서', cost: 2000, icon: IconShoppingBag, color: '#F4A261' },
      { id: 'date', name: '데이트권', cost: 3000, icon: IconTrophy, color: '#E76F51' }
    ];

    const App = () => {
      const kidsNames = ['듄지', '효니', '뀨리'];
      const [activeTab, setActiveTab] = useState(kidsNames[0]);
      const [currentTime, setCurrentTime] = useState(new Date());
      const [testMode, setTestMode] = useState(false);
      const [notification, setNotification] = useState(null);
      const notifyTimeout = useRef(null);

      const [kidsData, setKidsData] = useState({
        '듄지': createKidState(),
        '효니': createKidState(),
        '뀨리': createKidState()
      });

      const [showPopup, setShowPopup] = useState(false);
      const [quickActionTarget, setQuickActionTarget] = useState('듄지');

      useEffect(() => {
        const timer = setInterval(() => setCurrentTime(new Date()), 60000);
        return () => clearInterval(timer);
      }, []);

      const showNotification = (message, type = 'info') => {
        if (notifyTimeout.current) clearTimeout(notifyTimeout.current);
        setNotification({ message, type });
        notifyTimeout.current = setTimeout(() => setNotification(null), 3000);
      };

      const calcKidPoints = (kid) => {
        const hPts = kid.habits.filter(h => h.done).length * 20;
        const bPts = kid.earnedBonus ? 20 : 0;
        const mPts = (kid.learning.math.baseDone ? 100 : 0) + (kid.learning.math.extra * 150);
        const lPts = (kid.learning.language.baseDone ? 100 : 0) + (kid.learning.language.extra * 120);
        const ePts = kid.learning.elihigh.done ? 100 : 0;
        const engPts = kid.learning.englishBook.done ? 100 : 0;
        const dailyLiveEarned = hPts + bPts + mPts + lPts + ePts + engPts;
        const currentBalance = dailyLiveEarned + kid.adminAdjustments - kid.usedPoints;
        return { habitPts: hPts, learningPts: mPts + lPts + ePts + engPts, dailyLiveEarned, currentBalance };
      };

      const updateKidData = (kidName, updater) => {
        setKidsData(prev => ({ ...prev, [kidName]: updater(prev[kidName]) }));
      };

      const toggleHabit = (id) => {
        if(activeTab === 'ADMIN') return;
        updateKidData(activeTab, (kid) => {
          const newHabits = kid.habits.map(h => h.id === id ? { ...h, done: !h.done } : h);
          const isAllDone = newHabits.every(h => h.done);
          const currentHour = new Date().getHours();
          const isWithinTimeFrame = testMode || (currentHour >= 8 && currentHour < 20);
          let newBonus = kid.earnedBonus;
          if (isAllDone && !kid.earnedBonus) {
            if (isWithinTimeFrame) { newBonus = true; setShowPopup(true); }
            else { showNotification('8~20시 사이에만 보너스가 지급됩니다.', 'info'); }
          } else if (!isAllDone) { newBonus = false; }
          return { ...kid, habits: newHabits, earnedBonus: newBonus };
        });
      };

      const updateLearning = (type, field, value) => {
        updateKidData(activeTab, (kid) => {
          const newLearning = { ...kid.learning };
          const newTask = { ...newLearning[type] };
          if (field === 'baseDone') {
            newTask.baseDone = value;
            if (!value && newTask.extra !== undefined) newTask.extra = 0;
          } else if (field === 'extra') {
            if (!newTask.baseDone) { showNotification('기본 분량을 먼저 완료하세요.', 'error'); return kid; }
            newTask.extra = Math.max(0, newTask.extra + value);
          } else { newTask[field] = value; }
          newLearning[type] = newTask;
          return { ...kid, learning: newLearning };
        });
      };

      const purchaseReward = (cost, name) => {
        const { currentBalance } = calcKidPoints(kidsData[activeTab]);
        if (currentBalance >= cost) {
          const timestamp = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
          updateKidData(activeTab, (kid) => ({
            ...kid,
            usedPoints: kid.usedPoints + cost,
            history: [{ id: Date.now(), time: timestamp, type: 'spend', amount: cost, desc: name }, ...kid.history]
          }));
          showNotification(`${name} 교환 성공!`, 'success');
        } else { showNotification('포인트 부족!', 'error'); }
      };

      const handleQuickAction = (type, amount, desc) => {
        const timestamp = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
        const finalAmt = type === 'add' ? amount : -amount;
        updateKidData(quickActionTarget, (kid) => ({
          ...kid,
          adminAdjustments: kid.adminAdjustments + finalAmt,
          history: [{ id: Date.now(), time: timestamp, type: type === 'add' ? 'admin_add' : 'admin_sub', amount, desc }, ...kid.history]
        }));
        showNotification(`${quickActionTarget} 처리 완료`, type === 'add' ? 'success' : 'error');
      };

      const activeData = activeTab !== 'ADMIN' ? kidsData[activeTab] : null;
      const activePts = activeData ? calcKidPoints(activeData) : null;

      return (
        <div className="min-h-screen text-[#1D3557] pb-24 relative overflow-x-hidden pt-safe">
          {notification && (
            <div className={`fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] flex w-11/12 max-w-sm items-center gap-3 rounded-2xl p-4 shadow-2xl animate-toast ${notification.type === 'error' ? 'bg-red-50 text-red-700 border-2 border-red-200' : 'bg-[#1D3557] text-white'}`}>
              {notification.type === 'error' ? <IconAlertCircle /> : <IconCheckCircle />}
              <p className="text-sm font-bold flex-1">{notification.message}</p>
            </div>
          )}

          {showPopup && activeTab !== 'ADMIN' && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-[#1D3557]/80 backdrop-blur-md">
              <div className="relative bg-white rounded-[2rem] p-8 text-center max-w-sm w-full animate-pop-in">
                <div className="bg-[#E9C46A] w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4"><IconSparkles /></div>
                <h2 className="text-2xl font-black text-[#E76F51] mb-2">MISSION CLEAR!</h2>
                <div className="bg-gray-50 rounded-2xl p-4 border-2 border-dashed border-[#2A9D8F] mb-6 text-4xl font-black text-[#2A9D8F]">+20P</div>
                <button onClick={() => setShowPopup(false)} className="w-full bg-[#1D3557] text-white py-4 rounded-xl font-black">확인</button>
              </div>
            </div>
          )}

          <div className="sticky top-0 z-40 bg-white/90 backdrop-blur-md border-b">
            <div className="px-4 py-2 border-b flex justify-between items-center bg-gray-50 text-[10px] text-gray-400 font-bold">
              <div className="flex items-center gap-1"><IconClock /> {currentTime.toLocaleTimeString()} <button onClick={() => setTestMode(!testMode)} className="ml-2 underline">{testMode ? 'TEST' : ''}</button></div>
              {activeTab !== 'ADMIN' && <div className="text-[#1D3557]">잔액: <span className="text-[#E76F51]">{activePts?.currentBalance}P</span></div>}
            </div>
            <div className="flex overflow-x-auto no-scrollbar p-2 gap-2">
              {kidsNames.map(name => (
                <button key={name} onClick={() => setActiveTab(name)} className={`flex-1 min-w-[70px] py-2 rounded-xl text-sm font-black ${activeTab === name ? 'bg-[#1D3557] text-white shadow-md' : 'bg-white text-gray-400 border border-gray-100'}`}>{name}</button>
              ))}
              <button onClick={() => setActiveTab('ADMIN')} className={`flex items-center gap-1 px-4 py-2 rounded-xl text-sm font-black ${activeTab === 'ADMIN' ? 'bg-[#E76F51] text-white shadow-md' : 'bg-white text-gray-400 border border-gray-100'}`}><IconSettings /> 관리자</button>
            </div>
          </div>

          {activeTab === 'ADMIN' ? (
            <main className="max-w-7xl mx-auto px-4 mt-6 space-y-6">
              <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                {kidsNames.map(name => {
                  const pts = calcKidPoints(kidsData[name]);
                  return (
                    <div key={name} className="bg-white p-5 rounded-2xl shadow-sm border">
                      <h3 className="text-lg font-black">{name}</h3>
                      <div className="mt-2 text-xs text-gray-500 space-y-1">
                        <div className="flex justify-between"><span>오늘 획득</span><span>+{pts.dailyLiveEarned}P</span></div>
                        <div className="flex justify-between"><span>누적 사용</span><span>-{kidsData[name].usedPoints}P</span></div>
                        <div className="flex justify-between font-black border-t pt-1 mt-1 text-[#1D3557]"><span>현재 잔액</span><span>{pts.currentBalance}P</span></div>
                      </div>
                    </div>
                  );
                })}
              </div>

              <div className="bg-white p-5 rounded-[1.5rem] shadow-sm border-2 border-orange-50">
                <h3 className="text-base font-black mb-4 flex items-center gap-2"><IconZap /> 빠른 보상 및 패널티</h3>
                <select value={quickActionTarget} onChange={e => setQuickActionTarget(e.target.value)} className="w-full mb-4 p-2 border rounded-xl font-black text-sm">
                  {kidsNames.map(n => <option key={n} value={n}>{n}</option>)}
                </select>
                <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                  <button onClick={() => handleQuickAction('sub', 50, '오답/무성의 학습')} className="flex flex-col items-center p-3 bg-red-50 text-red-600 rounded-xl border border-red-200"><IconAlertOctagon /><span className="text-[10px] font-bold mt-1">오답/무성의</span><span className="font-black">-50P</span></button>
                  <button onClick={() => handleQuickAction('sub', 50, '거짓말 적발')} className="flex flex-col items-center p-3 bg-red-50 text-red-600 rounded-xl border border-red-200"><IconAlertCircle /><span className="text-[10px] font-bold mt-1">거짓말 적발</span><span className="font-black">-50P</span></button>
                  <button onClick={() => handleQuickAction('add', 50, '개별 미션 성공')} className="flex flex-col items-center p-3 bg-green-50 text-green-600 rounded-xl border border-green-200"><IconStar /><span className="text-[10px] font-bold mt-1">개별 미션 성공</span><span className="font-black">+50P</span></button>
                </div>
              </div>
            </main>
          ) : (
            <main className="max-w-7xl mx-auto px-4 mt-6 space-y-6">
              <div className="bg-[#1D3557] p-6 rounded-[2rem] text-white">
                <h1 className="text-2xl font-black">{activeTab}의 레벨업</h1>
                <p className="text-[10px] text-orange-200 opacity-80 mt-1">목표 체중 48kg처럼 정석대로!</p>
              </div>

              <section className="bg-white rounded-[1.5rem] p-5 shadow-sm border">
                <h2 className="text-lg font-black mb-4 flex items-center gap-2"><IconSparkles /> 오늘의 습관 (각 20P)</h2>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                  {activeData.habits.map(h => (
                    <button key={h.id} onClick={() => toggleHabit(h.id)} className={`flex items-center justify-between p-3 rounded-xl border-2 transition-all ${h.done ? 'bg-green-50 border-green-200' : 'bg-white border-gray-50'}`}>
                      <span className={`font-bold text-xs ${h.done ? 'text-green-700' : 'text-gray-400'}`}>{h.text}</span>
                      {h.done ? <IconCheckCircle className="text-green-600" /> : <IconCircle className="text-gray-200" />}
                    </button>
                  ))}
                </div>
              </section>

              <section className="space-y-4">
                <h2 className="text-lg font-black border-l-4 border-[#E76F51] pl-2">학습 미션</h2>
                <div className="bg-white p-4 rounded-2xl border shadow-sm">
                  <div className="flex justify-between items-center mb-3"><span className="font-black text-sm">📐 수학 (기본 100P / 추가 150P)</span><span className="font-black text-[#E76F51]">{(activeData.learning.math.baseDone ? 100 : 0) + (activeData.learning.math.extra * 150)}P</span></div>
                  <div className="flex gap-2">
                    <button onClick={() => updateLearning('math', 'baseDone', !activeData.learning.math.baseDone)} className={`flex-1 py-3 rounded-xl text-xs font-black ${activeData.learning.math.baseDone ? 'bg-[#E76F51] text-white' : 'bg-gray-100 text-gray-400'}`}>기본 완료</button>
                    <div className="flex-1 flex border rounded-xl overflow-hidden"><button onClick={() => updateLearning('math', 'extra', -1)} className="px-4">-</button><span className="flex-1 text-center py-3 text-[10px] font-black">추가 {activeData.learning.math.extra}장</span><button onClick={() => updateLearning('math', 'extra', 1)} className="px-4">+</button></div>
                  </div>
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <button onClick={() => updateLearning('elihigh', 'done', !activeData.learning.elihigh.done)} className={`p-4 rounded-2xl border-2 font-black text-xs ${activeData.learning.elihigh.done ? 'bg-[#1D3557] text-white' : 'bg-white text-gray-400'}`}>💻 엘리하이 (100P)</button>
                  <button onClick={() => updateLearning('englishBook', 'done', !activeData.learning.englishBook.done)} className={`p-4 rounded-2xl border-2 font-black text-xs ${activeData.learning.englishBook.done ? 'bg-[#1D3557] text-white' : 'bg-white text-gray-400'}`}>📚 영어책 3권 (100P)</button>
                </div>
              </section>

              <section className="bg-white p-5 rounded-[1.5rem] border shadow-sm">
                <h2 className="text-lg font-black mb-4 flex items-center gap-2"><IconShoppingBag /> 코인 상점</h2>
                <div className="grid grid-cols-2 gap-3">
                  {rewardItems.map(item => (
                    <button key={item.id} onClick={() => purchaseReward(item.cost, item.name)} className="p-4 border rounded-2xl flex flex-col items-center gap-1 active:scale-95 transition-transform">
                      <item.icon color={item.color} /><span className="text-[10px] font-bold text-gray-400">{item.name}</span><span className="font-black text-sm">{item.cost}P</span>
                    </button>
                  ))}
                </div>
              </section>
            </main>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
